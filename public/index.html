<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Console · Retail Suite by Spyne</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- Primary icon rail -->
    <aside class="rail">
      <div class="rail-logo">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="7" cy="8" r="2.4" fill="#0064e0"/><circle cx="14" cy="6" r="2.4" fill="#0a1317"/><circle cx="17.5" cy="13" r="2.4" fill="#0091ff"/><circle cx="10" cy="15" r="2.4" fill="#1c1e21"/></svg>
      </div>
      <nav class="rail-nav" id="railNav"></nav>
      <div class="rail-foot">
        <button class="rail-item" id="helpBtn" title="Help">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M9.6 9.6a2.5 2.5 0 014.4 1.6c0 1.7-2.5 2-2.5 3.3M12 17h.01"/></svg>
        </button>
        <button class="rail-avatar" title="Apex Auto Group">AA</button>
      </div>
    </aside>

    <!-- Secondary contextual menu -->
    <aside class="submenu" id="submenu"></aside>

    <!-- Main -->
    <div class="main">
      <header class="topbar">
        <div class="crumbs" id="crumbs"></div>
        <div class="topbar-right">
          <div class="search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
            <input placeholder="Search" />
          </div>
          <button class="chip" id="planChip"><span class="dot"></span>Comprehensive</button>
        </div>
      </header>
      <main class="content" id="content"></main>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
